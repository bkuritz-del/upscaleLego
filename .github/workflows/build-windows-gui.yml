name: Build Windows GUI EXE

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build GUI executable
        run: |
          pyinstaller --onefile --windowed --name LEGOPrintUpscaler gui_upscale_v2.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: LEGOPrintUpscaler-windows
          path: dist/LEGOPrintUpscaler.exe
