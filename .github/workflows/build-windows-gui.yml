name: Build Windows GUI EXE

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Show repo files
        run: dir

      - name: Verify Python can import upscale_core before build
        run: |
          python -c "import upscale_core; print(upscale_core.__file__)"

      - name: Build GUI executable
        run: |
          pyinstaller --clean --noconfirm LEGOPrintUpscaler.spec

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: LEGOPrintUpscaler-windows
          path: dist/LEGOPrintUpscaler.exe
